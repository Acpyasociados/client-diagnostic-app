<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estado de tu informe — ACP & Asociados</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 520px;
      overflow: hidden;
    }

    .header {
      background: #1a3a5c;
      padding: 24px 28px;
      color: white;
    }

    .header-brand {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
    }

    .header-sub {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      margin-top: 4px;
    }

    .body { padding: 28px; }

    /* Status banner */
    .status-banner {
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }
    .status-banner.active  { background: #eff6ff; border: 1px solid #bfdbfe; }
    .status-banner.done    { background: #f0fdf4; border: 1px solid #bbf7d0; }
    .status-banner.error   { background: #fef2f2; border: 1px solid #fecaca; }

    .status-icon  { font-size: 28px; flex-shrink: 0; line-height: 1; }
    .status-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin-bottom: 3px; }
    .status-msg   { font-size: 14px; color: #1e293b; line-height: 1.5; }

    /* Timeline */
    .timeline { list-style: none; position: relative; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 14px;
      top: 0; bottom: 0;
      width: 2px;
      background: #e2e8f0;
    }

    .tl-item {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 0 0 20px 0;
      position: relative;
    }
    .tl-item:last-child { padding-bottom: 0; }

    .tl-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      position: relative;
      z-index: 1;
      border: 2px solid transparent;
    }
    .tl-dot.done    { background: #16a34a; color: white; border-color: #16a34a; }
    .tl-dot.current { background: #2563eb; color: white; border-color: #2563eb; }
    .tl-dot.pending { background: white;   color: #94a3b8; border-color: #e2e8f0; }

    .tl-content { padding-top: 4px; flex: 1; }
    .tl-title {
      font-size: 14px;
      font-weight: 600;
      color: #1e293b;
    }
    .tl-title.pending { color: #94a3b8; font-weight: 400; }
    .tl-time {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 2px;
    }

    /* Premium badge */
    .premium-badge {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 14px 18px;
      margin-top: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .premium-badge-icon { font-size: 22px; }
    .premium-badge-text { font-size: 13px; color: #1e40af; }
    .premium-badge-text strong { display: block; margin-bottom: 2px; }

    /* WhatsApp button */
    .btn-wa {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #25D366;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      margin-top: 10px;
    }

    .footer {
      text-align: center;
      padding: 16px;
      color: #94a3b8;
      font-size: 12px;
    }

    /* Loading / error states */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 48px 28px;
      color: #64748b;
      font-size: 14px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-state {
      padding: 32px 28px;
      text-align: center;
      color: #dc2626;
    }
    .error-state .error-icon { font-size: 40px; margin-bottom: 12px; }
    .error-state p { font-size: 14px; color: #475569; margin-top: 8px; }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="header">
    <div class="header-brand">ACP &amp; Asociados</div>
    <div class="header-title">Estado de tu informe</div>
    <div class="header-sub" id="headerSub">Cargando información…</div>
  </div>
  <div class="body" id="cardBody">
    <div class="loading">
      <div class="spinner"></div>
      Cargando estado…
    </div>
  </div>
</div>

<div class="footer">
  ¿Tienes dudas? Escríbenos a
  <a href="mailto:contacto@acpasociados.cl" style="color:#2563eb;">contacto@acpasociados.cl</a>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const leadId  = params.get('lead_id');
  const token   = params.get('token');

  function fmt(iso) {
    if (!iso) return null;
    return new Date(iso).toLocaleString('es-CL', {
      day: '2-digit', month: 'long', year: 'numeric',
      hour: '2-digit', minute: '2-digit'
    });
  }

  function renderError(msg) {
    document.getElementById('headerSub').textContent = '';
    document.getElementById('cardBody').innerHTML = `
      <div class="error-state">
        <div class="error-icon">😕</div>
        <strong style="font-size:15px;">${msg}</strong>
        <p>Si crees que esto es un error, escríbenos a <a href="mailto:contacto@acpasociados.cl">contacto@acpasociados.cl</a></p>
      </div>`;
  }

  async function load() {
    if (!leadId || !token) {
      renderError('Enlace inválido');
      return;
    }

    let data;
    try {
      const res = await fetch(`/.netlify/functions/get-status?lead_id=${encodeURIComponent(leadId)}&token=${encodeURIComponent(token)}`);
      data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error desconocido');
    } catch (err) {
      renderError(err.message);
      return;
    }

    // Header
    document.getElementById('headerSub').textContent =
      `${data.company} · Plan ${data.plan === 'premium' ? 'Premium ⭐' : 'Básico'}`;

    // Status banner
    const bannerClass = data.info.done ? 'done' : (data.status === 'payment_failed' ? 'error' : 'active');
    const bannerHtml = `
      <div class="status-banner ${bannerClass}">
        <div class="status-icon">${data.info.icon}</div>
        <div>
          <div class="status-label">${data.info.label}</div>
          <div class="status-msg">${data.info.message}</div>
        </div>
      </div>`;

    // Timeline
    const tlItems = data.timeline.map(step => {
      const stepInfo    = data.info.step;
      const isDone      = step.done;
      const isCurrent   = !isDone && step.step === stepInfo;
      const dotClass    = isDone ? 'done' : (isCurrent ? 'current' : 'pending');
      const dotIcon     = isDone ? '✓' : (isCurrent ? '●' : step.step);
      const titleClass  = (!isDone && !isCurrent) ? 'pending' : '';

      return `
        <li class="tl-item">
          <div class="tl-dot ${dotClass}">${dotIcon}</div>
          <div class="tl-content">
            <div class="tl-title ${titleClass}">${step.label}</div>
            ${step.ts ? `<div class="tl-time">${fmt(step.ts)}</div>` : ''}
          </div>
        </li>`;
    }).join('');

    // Premium session block
    const waPhone = '56944018594';
    const waMsg   = encodeURIComponent('Hola, soy ' + data.name + ' de ' + data.company + '. Acabo de recibir mi informe Premium y quiero agendar mi sesión de implementación.');
    const premiumBlock = (data.isPremium && data.status === 'enviado') ? `
      <div class="premium-badge">
        <div class="premium-badge-icon">⭐</div>
        <div class="premium-badge-text">
          <strong>Tu sesión de implementación está incluida</strong>
          Agenda tus 30 min con tu asesor ACP cuando quieras.
          <br>
          <a class="btn-wa" href="https://wa.me/${waPhone}?text=${waMsg}" target="_blank">
            📱 Agendar por WhatsApp
          </a>
        </div>
      </div>` : '';

    document.getElementById('cardBody').innerHTML = `
      ${bannerHtml}
      <ul class="timeline">${tlItems}</ul>
      ${premiumBlock}`;
  }

  load();
</script>
</body>
</html>
