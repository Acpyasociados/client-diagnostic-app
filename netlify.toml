[build]
  command = "echo 'Build complete' && date > .netlify-build-time"
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/*"
  to = "/"
  status = 200

[functions]
  directory = "netlify/functions"
  external_node_modules = ["@sendgrid/mail"]
  node_bundler = "esbuild"

[context.production.environment]
  # Secrets (MERCADO_PAGO_ACCESS_TOKEN, SENDGRID_API_KEY) are configured in Netlify UI
  # Non-secret environment variables:
  SENDGRID_FROM_EMAIL = "noreply@acp-asociados.com"
  ADVISOR_EMAIL = "asesor.pac@gmail.com"
  SITE_URL = "https://acp-asociados.netlify.app"
  NODE_ENV = "production"
  PRICE_BASIC_CLP = "49900"
  PRICE_PREMIUM_CLP = "149900"
