[build]
  command = "echo 'Build complete'"
    functions = "netlify/functions"
      publish = "."

      [[redirects]]
        from = "/*"
          to = "/"
            status = 200

            [functions]
              directory = "netlify/functions"
                external_node_modules = ["@sendgrid/mail"]
                  node_bundler = "esbuild"

# IMPORTANT: Production environment variables are configured in Netlify UI
# DO NOT store sensitive credentials (API keys, tokens) in this file
# Configure the following in Netlify Dashboard > Site settings > Build & deploy > Environment:
# - MERCADO_PAGO_ACCESS_TOKEN
# - SENDGRID_API_KEY
# - SENDGRID_FROM_EMAIL
# - ADVISOR_EMAIL
# - SITE_URL
# - NODE_ENV
# - PRICE_BASIC_CLP
# - PRICE_PREMIUM_CLP
# Trigger Netlify redeploy - May 3, 2026
