<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico Estratégico - ACP & Asociados</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #1B3B5C 0%, #16A085 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
        
        .form-container.active {
            display: block;
        }
        
        .preview-container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .preview-container.active {
            display: block;
        }
        
        .preview-container iframe {
            width: 100%;
            height: 800px;
            border: none;
            border-radius: 8px;
        }
        
        .success-container {
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            text-align: center;
        }
        
        .success-container.active {
            display: block;
        }
        
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        
        .success-container h2 {
            color: #16A085;
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        .success-container p {
            color: #2C3E50;
            font-size: 16px;
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1B3B5C;
            border-bottom: 3px solid #D4AF37;
            padding-bottom: 10px;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #1B3B5C;
            font-size: 14px;
        }
        
        input[type="text"],
        input[type="email"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #16A085;
            box-shadow: 0 0 0 3px rgba(22, 160, 133, 0.1);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .opportunity-box {
            background: #ECF0F3;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #16A085;
            margin-bottom: 20px;
        }
        
        .opportunity-box h4 {
            color: #1B3B5C;
            margin-bottom: 15px;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }
        
        button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'DM Sans', sans-serif;
        }
        
        .btn-primary {
            background: #16A085;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0d8670;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(22, 160, 133, 0.3);
        }
        
        .btn-secondary {
            background: #3498DB;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #2980b9;
        }
        
        .btn-back {
            background: #95A5A6;
            color: white;
        }
        
        .btn-back:hover {
            background: #7f8c8d;
        }
        
        .btn-success {
            background: #16A085;
            color: white;
        }
        
        .btn-success:hover {
            background: #0d8670;
        }
        
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        
        .error-message {
            background: #fadbd8;
            border: 1px solid #f5b7b1;
            color: #c0392b;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                flex-direction: column;
            }
            
            .form-container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Diagnóstico Estratégico</h1>
            <p>ACP & Asociados</p>
        </div>
        
        <!-- FORMULARIO -->
        <div class="form-container active" id="formContainer">
            <div class="error-message" id="errorMessage"></div>
            
            <form id="diagnosticoForm">
                <!-- CLIENTE -->
                <h3 class="section-title">📋 Información del Cliente</h3>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Nombre Completo *</label>
                        <input type="text" name="nombreCliente" placeholder="Ej: Juan García López" required>
                    </div>
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" name="emailCliente" placeholder="Ej: juan@empresa.cl" required>
                    </div>
                    <div class="form-group">
                        <label>Empresa *</label>
                        <input type="text" name="empresa" placeholder="Ej: Mi Empresa S.A." required>
                    </div>
                    <div class="form-group">
                        <label>Rubro *</label>
                        <input type="text" name="rubro" placeholder="Ej: Transporte, Retail, Servicios" required>
                    </div>
                    <div class="form-group">
                        <label>Ubicación *</label>
                        <input type="text" name="ubicacion" placeholder="Ej: Santiago, Región Metropolitana" required>
                    </div>
                    <div class="form-group">
                        <label>Zona de Operación *</label>
                        <input type="text" name="zonaOperacion" placeholder="Ej: Zona Sur, Nacional, Regional" required>
                    </div>
                </div>
                
                <!-- OPERACIONALES -->
                <h3 class="section-title">📊 Datos Operacionales</h3>
                <div class="form-group">
                    <label>Descripción de la Operación Actual *</label>
                    <textarea name="descripcionOperacion" placeholder="Ej: Contamos con 3 vehículos de carga, 5 empleados, operamos en zona sur con entregas de lunes a viernes..." required></textarea>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Volumen/Escala Actual *</label>
                        <input type="text" name="volumenActual" placeholder="Ej: 50 clientes/mes, 100 transacciones/día, 500 unidades/semana" required>
                    </div>
                    <div class="form-group">
                        <label>Clientes/Segmentos Principales *</label>
                        <input type="text" name="clientesActuales" placeholder="Ej: 3 clientes principales, Retail, PyMEs, Distribuidoras" required>
                    </div>
                    <div class="form-group">
                        <label>Ingresos Mensuales Actuales *</label>
                        <input type="text" name="ingresosActuales" placeholder="Ej: $500k-$800k, $1.2M, $350k" required>
                    </div>
                    <div class="form-group">
                        <label>Margen Operativo Actual (%) *</label>
                        <input type="text" name="margenActual" placeholder="Ej: 35%, 40-45%, 30-50%" required>
                    </div>
                </div>
                
                <!-- PROBLEMA -->
                <h3 class="section-title">⚠️ Problema Identificado</h3>
                <div class="form-group">
                    <label>Problema Principal Identificado *</label>
                    <textarea name="problemaPrincipal" placeholder="Ej: Dependencia de pocos clientes. Si pierdo el cliente principal, caen ingresos 40%. Márgenes bajo presión por competencia..." required></textarea>
                </div>
                <div class="form-group">
                    <label>Impacto del Problema *</label>
                    <textarea name="impactoProblema" placeholder="Ej: Ingresos volátiles. Imposible planificar. No puedo contratar personal fijo. Estrés operacional constante..." required></textarea>
                </div>
                
                <!-- OPORTUNIDADES -->
                <h3 class="section-title">🎯 Oportunidades (1 Obligatoria + 1 Opcional)</h3>
                <div id="opportunitiesContainer"></div>
                
                <!-- META FINAL -->
                <h3 class="section-title">🏆 Meta Final (12 Semanas)</h3>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Ingresos Nuevos Esperados</label>
                        <input type="text" name="metaIngresos" placeholder="Ej: $250k-$400k/mes">
                    </div>
                    <div class="form-group">
                        <label>Crecimiento Esperado (%)</label>
                        <input type="text" name="metaCrecimiento" placeholder="Ej: 40-60%, 50%, 25-35%">
                    </div>
                </div>
                <div class="form-group">
                    <label>ROI Esperado</label>
                    <input type="text" name="roiEsperado" placeholder="Ej: 5-8x, 6x, 3-5x">
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn-primary">📄 Generar Informe</button>
                </div>
            </form>
        </div>
        
        <!-- PREVIEW -->
        <div class="preview-container" id="previewContainer">
            <div class="button-group">
                <button type="button" class="btn-primary" onclick="descargarInforme()">⬇️ Descargar Informe</button>
                <button type="button" class="btn-secondary" onclick="enviarEmail()">✉️ Enviar por Email</button>
                <button type="button" class="btn-back" onclick="volverAlFormulario()">← Volver</button>
            </div>
            <iframe id="previewIframe"></iframe>
        </div>
        
        <!-- SUCCESS -->
        <div class="success-container" id="successContainer">
            <div class="success-icon">✅</div>
            <h2>¡Éxito!</h2>
            <p>Tu informe ha sido generado correctamente.</p>
            <p>Puedes descargarlo o volver a crear otro.</p>
            <button type="button" class="btn-success" onclick="volverAlFormulario()" style="width: 300px; margin: 0 auto;">Crear otro informe</button>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/index.min.js"></script>
    <script>
        // Inicializar EmailJS
        emailjs.init('dZhZ5eK-2NgfWBlhT'); // Tu Public Key
    </script>
    
    <script>
        // Crear oportunidades dinámicamente
        function crearOportunidades() {
            const container = document.getElementById('opportunitiesContainer');
            container.innerHTML = '';
            
            for (let i = 1; i <= 2; i++) {
                const esObligatoria = i === 1;
                const html = `
                    <div class="opportunity-box">
                        <h4>Oportunidad ${i} ${esObligatoria ? '(Obligatoria)' : '(Opcional)'}</h4>
                        <div class="grid-2">
                            <div class="form-group">
                                <label>Nombre ${esObligatoria ? '*' : ''}</label>
                                <input type="text" name="op${i}_nombre" placeholder="Ej: Exportación de frutas, E-commerce, Nuevos mercados" ${esObligatoria ? 'required' : ''}>
                            </div>
                            <div class="form-group">
                                <label>Volumen</label>
                                <input type="text" name="op${i}_volumen" placeholder="Ej: 5-10 clientes nuevos, 200 transacciones/mes">
                            </div>
                            <div class="form-group">
                                <label>Tarifa/Precio</label>
                                <input type="text" name="op${i}_tarifa" placeholder="Ej: $15-20/km, $500/proyecto, 25% margen">
                            </div>
                            <div class="form-group">
                                <label>Margen</label>
                                <input type="text" name="op${i}_margen" placeholder="Ej: 40-45%, 50%, 35-40%">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Mercado</label>
                            <textarea name="op${i}_mercado" placeholder="Ej: Exportadoras de frutas en Maule/Araucanía. Mercado creciente de +25%/año. 500 empresas potenciales en zona..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Ingresos Potenciales</label>
                            <input type="text" name="op${i}_ingresos" placeholder="Ej: $150k-$250k/mes, $80k-$120k/mes">
                        </div>
                        <div class="form-group">
                            <label>Acción Inicial</label>
                            <textarea name="op${i}_accion" placeholder="Ej: Semana 1-2: Identificar 10 empresas potenciales. Semana 3: Contactar y presentar propuesta. Semana 4: Negociar primer contrato..."></textarea>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            }
        }
        
        // Obtener datos del formulario
        function obtenerDatos() {
            const form = document.getElementById('diagnosticoForm');
            const formData = new FormData(form);
            const datos = Object.fromEntries(formData);
            
            // Oportunidades con datos - Solo requiere Oportunidad 1
            const oportunidades = [];
            
            // Oportunidad 1 es OBLIGATORIA
            if (datos['op1_nombre']) {
                oportunidades.push({
                    nombre: datos['op1_nombre'],
                    mercado: datos['op1_mercado'],
                    volumen: datos['op1_volumen'],
                    tarifa: datos['op1_tarifa'],
                    ingresos: datos['op1_ingresos'],
                    margen: datos['op1_margen'],
                    accion: datos['op1_accion']
                });
            } else {
                mostrarError('La Oportunidad 1 es obligatoria (mínimo el nombre)');
                return null;
            }
            
            // Oportunidad 2 es OPCIONAL
            if (datos['op2_nombre']) {
                oportunidades.push({
                    nombre: datos['op2_nombre'],
                    mercado: datos['op2_mercado'],
                    volumen: datos['op2_volumen'],
                    tarifa: datos['op2_tarifa'],
                    ingresos: datos['op2_ingresos'],
                    margen: datos['op2_margen'],
                    accion: datos['op2_accion']
                });
            }
            
            return { ...datos, oportunidades };
        }
        
        // Estado de carga
        let loading = false;
        
        function setLoading(isLoading) {
            loading = isLoading;
        }
        
        // Mostrar error
        function mostrarError(mensaje) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = mensaje;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }
        
        // Generar HTML del informe
        function generarInformeHTML(datos) {
            const htmlOps = datos.oportunidades.map((op, idx) => `
                <div style="background: #ECF0F3; padding: 30px; border-radius: 6px; border-left: 4px solid #16A085; margin-bottom: 25px;">
                    <h4 style="margin: 0 0 15px 0; color: #1B3B5C; font-size: 16px; font-weight: 600;">${idx + 1}. ${op.nombre}</h4>
                    <p><strong>Mercado:</strong> ${op.mercado}</p>
                    <p><strong>Volumen:</strong> ${op.volumen}</p>
                    <p><strong>Tarifa/Precio:</strong> ${op.tarifa}</p>
                    <p><strong>Ingresos Potenciales:</strong> ${op.ingresos}</p>
                    <p><strong>Margen Esperado:</strong> ${op.margen}</p>
                    <div style="background: #E8F8F5; padding: 15px; border-radius: 4px; margin-top: 15px; border-left: 3px solid #16A085; font-size: 13px;">
                        <strong style="color: #1B3B5C;">Acción semana 1-2:</strong> ${op.accion}
                    </div>
                </div>
            `).join('');
            
            return `<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propuesta - ${datos.nombreCliente}</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            line-height: 1.7;

            background-color: #ECF0F3;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        header {
            background: linear-gradient(135deg, #1B3B5C 0%, #0F2C47 100%);
            color: #FFFFFF;
            padding: 80px 40px;
            border-radius: 8px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        header::before {
            content: '';
            position: absolute;
            top: 0;

            width: 400px;
            height: 400px;
            background: rgba(22, 160, 133, 0.05);
            border-radius: 50%;
        }
        .header-content { position: relative; z-index: 2; }
        header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 52px;
            line-height: 1.2;
            margin-bottom: 15px;
            font-weight: 400;
        }
        header h2 {

        }
        section { margin-bottom: 60px; }
        h2 {
            font-family: 'Cormorant Garamond', serif;

        }
        .highlight-box {

        }
        .metric {
            background: #ECF0F3;

            border-radius: 6px;
            margin-bottom: 15px;
            border-left: 4px solid #D4AF37;
        }
        .metric-label {
            font-weight: 600;
            color: #1B3B5C;

            text-transform: uppercase;

        }
        .metric-value {

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;

        }
        footer {
            background: #1B3B5C;

        }
        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
            header h1 { font-size: 36px; }
            h2 { font-size: 28px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1>${datos.rubro}:</h1>
                <h2>Estrategia de Crecimiento</h2>
                <div class="client-info">
                    <p><strong>Empresa:</strong> ${datos.empresa}</p>
                    <p><strong>Contacto:</strong> ${datos.nombreCliente}</p>
                    <p><strong>Ubicación:</strong> ${datos.ubicacion}</p>
                </div>

        </header>
        <div class="content">

                <div class="grid-2">

            <section>
                <h2>Oportunidades Estratégicas</h2>
                ${htmlOps}
            </section>
            <section>
                <h2>Propuesta Comercial</h2>
                <div style="background: #ECF0F3; padding: 30px; border-radius: 6px; border-left: 4px solid #16A085;">

                    <p><strong>Resultado esperado:</strong></p>
                    <p>✓ Ingresos nuevos: ${datos.metaIngresos}</p>

            </section>
        </div>
        <footer>
            <p><strong>ACP & Asociados</strong></p>

        }
        
        // Descargar informe
        function descargarInforme() {
            const form = document.getElementById('diagnosticoForm');
            const nombreCliente = form.nombreCliente.value;
            const iframe = document.getElementById('previewIframe');
            const html = iframe.srcdoc;
            
            const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `PROPUESTA_${nombreCliente.replace(/\s+/g, '_').toUpperCase()}.html`;
            link.click();
        }
        
        // Enviar email con EmailJS
        function enviarEmail() {
            setLoading(true);
            const form = document.getElementById('diagnosticoForm');
            const emailCliente = form.emailCliente.value;
            const nombreCliente = form.nombreCliente.value;
            
            // Parámetros para el email
            const templateParams = {
                nombre: nombreCliente,
                email: emailCliente,
                to_email: emailCliente,
                empresa: form.empresa.value
            };
            
            // Enviar con EmailJS
            emailjs.send('service_bhsm8le', 'diagnostico_acp', templateParams)
                .then(function(response) {
                    console.log('Email enviado:', response);
                    mostrarSuccess();
                    setLoading(false);
                }, function(error) {
                    console.log('Error al enviar:', error);
                    mostrarError('Error al enviar email. Intenta descargar el informe manualmente.');
                    setLoading(false);
                });
        }
        
        // Mostrar éxito
        function mostrarSuccess() {
            document.getElementById('previewContainer').classList.remove('active');
            document.getElementById('formContainer').classList.remove('active');
            document.getElementById('successContainer').classList.add('active');
        }
        
        // Volver al formulario
        function volverAlFormulario() {
            document.getElementById('formContainer').classList.add('active');
            document.getElementById('previewContainer').classList.remove('active');
            document.getElementById('successContainer').classList.remove('active');
        }
        
        // Envío del formulario
        document.getElementById('diagnosticoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const datos = obtenerDatos();
            if (!datos) return;
            
            const html = generarInformeHTML(datos);
            const iframe = document.getElementById('previewIframe');
            iframe.srcdoc = html;
            
            // Mostrar preview
            document.getElementById('formContainer').classList.remove('active');
            document.getElementById('previewContainer').classList.add('active');
        });
        
        // Inicializar
        crearOportunidades();
    </script>
</body>
</html>
